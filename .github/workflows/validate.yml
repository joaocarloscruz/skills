name: Validate skills

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install official validator
        run: python -m pip install --disable-pip-version-check "skills-ref==0.1.1"

      - name: Validate repository catalog
        run: python scripts/validate_skills.py

      - name: Audit catalog quality
        run: python skills/audit-skill-catalog/scripts/audit_catalog.py . --fail-on-warning

      - name: Validate Agent Skills format
        run: |
          for skill in skills/*; do
            agentskills validate "$skill"
          done

      - name: Compile bundled Python scripts
        run: python -m py_compile scripts/validate_skills.py skills/audit-skill-catalog/scripts/audit_catalog.py

      - name: Parse PowerShell installer
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [void][System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path scripts/install.ps1),
            [ref]$tokens,
            [ref]$errors
          )
          if ($errors) {
            $errors | Format-List
            exit 1
          }
