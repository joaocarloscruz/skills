name: Validate skills

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Install official validator
        run: python -m pip install --disable-pip-version-check "skills-ref==0.1.1"

      - name: Validate repository catalog
        run: python scripts/validate_skills.py

      - name: Verify generated router bundles
        run: python scripts/build_router_bundles.py --check

      - name: Audit catalog quality
        run: python library/audit-skill-catalog/scripts/audit_catalog.py library --fail-on-warning

      - name: Validate activation regression fixtures
        run: python scripts/validate_activation_cases.py

      - name: Test repository tooling
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Validate Agent Skills format
        run: |
          for skill in skills/* library/*; do
            agentskills validate "$skill"
          done

      - name: Compile bundled Python scripts
        run: python -m py_compile scripts/build_router_bundles.py scripts/validate_skills.py scripts/validate_activation_cases.py library/audit-skill-catalog/scripts/audit_catalog.py

      - name: Parse PowerShell installer
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [void][System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path scripts/install.ps1),
            [ref]$tokens,
            [ref]$errors
          )
          if ($errors) {
            $errors | Format-List
            exit 1
          }
